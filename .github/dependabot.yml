# Dependabot configuration
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    versioning-strategy: increase
    open-pull-requests-limit: 10
    groups:
      typescript-group:
        patterns:
          - "typescript"
          - "tsx"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      test-group:
        patterns:
          - "vitest"
        update-types:
          - "minor"
          - "patch"
      vite-group:
        patterns:
          - "vite"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "dependencies"
